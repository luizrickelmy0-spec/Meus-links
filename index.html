.container{

.top{
    display:flex;
    justify-content:center;
    align-items:center;

.avatar{
    width:120px;
    height:120px;

.username{
    margin-top:10px;

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    padding:20px;
    margin-bottom:25px;
}

.botao{
    display:block;
    margin:10px 0;
    padding:15px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    transition:0.3s;
}

.botao:hover{
    transform:scale(1.03);
    background:rgba(255,255,255,0.2);
}

.ad-small{
    width:90px;
    height:90px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:15px;

    background:rgba(255,255,255,0.08);

    border:2px solid #b14cff;

    animation:glow 2s infinite alternate;

    box-shadow:
    0 0 10px #b14cff,
    0 0 20px #b14cff;
}

.ad-box{
    margin:25px 0;
    padding:25px;

    border-radius:20px;

    background:rgba(255,255,255,0.08);

    border:2px solid #b14cff;

    animation:glow 2s infinite alternate;

    box-shadow:
    0 0 10px #b14cff,
    0 0 20px #b14cff,
    0 0 40px #b14cff;
}

@keyframes glow{

    from{
        box-shadow:
        0 0 10px #b14cff,
        0 0 20px #b14cff;
    }

    to{
        box-shadow:
        0 0 20px #b14cff,
        0 0 40px #b14cff,
        0 0 60px #b14cff;
    }

}

</style>
